name: Retrain model

# Triggered from the admin panel (apps/web/src/app/api/admin/retrain/route.ts)
# rather than running training on the always-on FastAPI serving container,
# which would risk starving live /predict traffic for the duration of a
# multi-epoch run. See ml/scripts/retrain_and_report.py for the full
# orchestration and docs/DEPLOY_ML_API.md for how a promoted checkpoint gets
# applied to the serving host afterwards.
on:
  workflow_dispatch:
    inputs:
      model_run_id:
        description: "UUID of the model_runs row to update with progress/results"
        required: true

permissions:
  # retrain_and_report.py's create_github_release() calls the Releases API
  # directly with the workflow's own auto-issued GITHUB_TOKEN — needs
  # contents:write or that call 403s regardless of repo/org default token
  # permissions.
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export active measurement schema
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/export_schema.py

      - name: Run retraining
        id: run_retraining
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET: ${{ vars.KAGGLE_DATASET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/retrain_and_report.py --model-run-id "${{ inputs.model_run_id }}"

      # A failure inside "Run retraining" already reports its own specific
      # error to model_runs (see retrain_and_report.py's except block) before
      # re-raising, so this step's outcome is "failure", not "skipped" — this
      # condition only fires for a failure in an *earlier* step (checkout,
      # dependency install, schema export), which has no such handler and
      # would otherwise leave the run stuck at "queued" forever with no
      # feedback in the admin panel.
      - name: Report an earlier-step failure back to model_runs
        if: failure() && steps.run_retraining.outcome == 'skipped'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "from scripts.retrain_and_report import update_run; update_run('${{ inputs.model_run_id }}', status='failed', error='Workflow failed before training started (dependency install or schema export) - check the Actions run logs.')"

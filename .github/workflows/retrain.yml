name: Retrain model

# Triggered from the admin panel (apps/web/src/app/api/admin/retrain/route.ts)
# rather than running training on the always-on FastAPI serving container,
# which would risk starving live /predict traffic for the duration of a
# multi-epoch run. See ml/scripts/retrain_and_report.py for the full
# orchestration and docs/DEPLOY_ML_API.md for how a promoted checkpoint gets
# applied to the serving host afterwards.
on:
  workflow_dispatch:
    inputs:
      model_run_id:
        description: "UUID of the model_runs row to update with progress/results"
        required: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4

      # New admin-labeled photos land on this branch (see
      # apps/web/src/app/api/admin/dataset/route.ts), not in a database or
      # bucket — Kaggle only supports syncing a whole folder as a dataset
      # version, so the staged files need to be on disk for
      # retrain_and_report.py to pick up. The branch won't exist yet if no
      # admin has uploaded anything since the last retrain, so this is
      # allowed to fail — the script treats a missing staging dir as "no new
      # images this run," not an error.
      - name: Checkout dataset-staging branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: dataset-staging
          path: dataset-staging-checkout

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run retraining
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET: ${{ vars.KAGGLE_DATASET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/retrain_and_report.py \
            --model-run-id "${{ inputs.model_run_id }}" \
            --staging-dir "${{ github.workspace }}/dataset-staging-checkout/ml/dataset_incoming"
